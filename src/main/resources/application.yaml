spring:
  application:
    name: curation-demo
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    schema:
      printer:
        enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/bottle_note?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: bottle_note
    password: bottle_note_1234
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8081

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    org.springframework.web: INFO
    io.git.curation: DEBUG
