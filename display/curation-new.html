<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>큐레이션 등록 · Curation Demo</title>
  <link rel="stylesheet" href="./css/common.css" />
</head>
<body data-page="curation-new">
  <header class="topbar">
    <div class="brand">
      <span class="logo">CD</span>
      <span>Curation Demo</span>
    </div>
    <nav>
      <a href="./index.html" data-page="home">홈</a>
      <a href="./specs.html" data-page="specs">스펙 목록</a>
      <a href="./curation-new.html" data-page="curation-new">큐레이션 등록</a>
      <a href="./curations.html" data-page="curations">큐레이션 목록</a>
      <a href="./curation-detail.html" data-page="curation-detail">큐레이션 상세</a>
      <a href="http://localhost:8081/swagger-ui.html" target="_blank" class="external">Swagger</a>
    </nav>
  </header>

  <main>
    <a href="./index.html" class="back-link">← 홈</a>

    <div class="page-head">
      <div>
        <h2>큐레이션 등록</h2>
        <div class="subtitle">스펙을 선택하면 requestSpec 기반 동적 폼이 렌더되고, 제출 시 서버에서 JSON Schema 검증 후 저장합니다.</div>
      </div>
    </div>

    <div id="alert" class="alert" style="display:none;"></div>

    <form id="curation-form" onsubmit="event.preventDefault();">
      <!-- 1. 스펙 선택 -->
      <section class="form-section">
        <h3>1. 스펙 선택</h3>
        <div class="section-sub">등록할 큐레이션의 양식을 고르세요.</div>
        <div id="spec-picker" class="spec-picker"></div>
      </section>

      <!-- 2. 큐레이션 공통 정보 -->
      <section class="form-section">
        <h3>2. 큐레이션 공통 정보</h3>
        <div class="section-sub">curation 테이블에 들어가는 공통 메타.</div>

        <div class="field">
          <label for="cur-name">이름 <span class="req">*</span></label>
          <input type="text" id="cur-name" required placeholder="예: 봄 추천 위스키" />
        </div>

        <div class="field">
          <label for="cur-desc">설명</label>
          <textarea id="cur-desc" placeholder="큐레이션 설명"></textarea>
        </div>

        <div class="field-grid-2">
          <div class="field">
            <label for="cur-cover">커버 이미지 URL</label>
            <input type="url" id="cur-cover" placeholder="https://..." />
          </div>
          <div class="field">
            <label for="cur-order">노출 순서</label>
            <input type="number" id="cur-order" value="0" />
          </div>
        </div>

        <div class="field">
          <label>활성화</label>
          <div class="checkbox-row">
            <input type="checkbox" id="cur-active" checked />
            <span>체크 시 is_active=true</span>
          </div>
        </div>
      </section>

      <!-- 3. 동적 payload -->
      <section class="form-section">
        <h3 id="dynamic-title">스펙을 선택하면 동적 폼이 렌더됩니다</h3>
        <div class="section-sub" id="dynamic-sub"></div>
        <div id="dynamic-form"></div>
      </section>

      <div class="toolbar">
        <button type="button" id="reset" class="ghost">초기화</button>
        <button type="button" id="submit">등록</button>
      </div>
    </form>
  </main>

  <script type="module" src="./js/nav.js"></script>
  <script type="module" src="./js/curation-new.js"></script>
</body>
</html>
